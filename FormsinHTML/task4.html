<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 4</title>
  </head>
  <body>
    <h3><b>Application Form</b></h3>
    <form action="">
      <div>
        <label for="name">First Name:</label>
        <input type="text" id="name" name="User name" />
        <label for="name">Last Name:</label>
        <input type="text" id="name" name="User name" />
      </div>
      <br />
      <div>
        <label for="date">Date of birth:</label>
        <input type="date" id="date" name="User Date of birth" />
        <label for="age">Age:</label>
        <input type="number" id="age" name="User age" />
      </div>
      <br />
      <div>
        <label for="gender">Gender:</label>
        <select name="gender" id="gender">
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
        <label for="email">Email Address:</label>
        <input
          type="email"
          id="email"
          name="userEmail"
          placeholder="Enter email address"
        />
      </div>
      <br />
      <div>
        <label for="position Available">Position Available:</label>

        <label for="position Available">Junior Developer</label>
        <input
          type="radio"
          id="position Available"
          name="position Available"
          value="Junior Developer"
        />

        <label for="position Available">Mid-level Developer</label>
        <input
          type="radio"
          id="position Available"
          name="position Available"
          value="Mid-level Developer"
        />

        <label for="position Available">Senior Developer</label>
        <input
          type="radio"
          id="position Available"
          name="position Available"
          value="Senior Developer"
        />
      </div>
      <br>
      <div>
        <label for="programming language">Programming Languages:</label>

        <label for="programming language">Java</label>
        <input
          type="checkbox"
          id="programming language"
          name="programming language"
          value="Java"
        />

        <label for="programming language">JavaScript</label>
        <input
          type="checkbox"
          id="programming language"
          name="programming language"
          value="JavaScript"
        />

        <label for="programming language">Python</label>
        <input
          type="checkbox"
          id="programming language"
          name="programming language"
          value="Python"
        />
      </div>
      <br>
      <div>
        <label for="password">Password:</label>
        <input type="password" id="password" name="userPass">

        <label for="Confirm Password">Confirm Password:</label>
        <input type="password" id="password" name="userPass">
      </div>
      <br>
      <div>
        <button>Submit</button>
        <button>Reset</button>
      </div>
    </form>
  </body>
</html>
