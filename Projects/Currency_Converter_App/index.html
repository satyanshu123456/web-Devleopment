<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <style>
    .head {
      position: fixed;
      width: 100%;
      top: 0;
    }
    .mainD {
      height: 550px;
      width: 400px;
      border-radius: 10px;
    }
    .amt{
      padding: 27px;
    }
    .couN{
      height:36px ;
      width: 150px;
      background-color: blueviolet;
    }
    .btn{
      height: 50px;
      width: 330px ;
      background-color: blueviolet;
      color: white;
    }
  </style>
  <body>
    <header class="head bg-danger text-light p-2 text-center">
      <h2>Currency Converter</h2>
    </header>

    <div
      class="mt-5 d-flex justify-content-center align-items-center"
      style="background-color: blueviolet"
    >
      <div
        class="mainD border border-1 shadow bg-white mb-5"
        style="margin-top: 100px"
      >
        <div
          class="mt-4"
          style="display: flex; justify-content: center; align-items: center"
        >
          <img
            src="./currencyConvertImg.png"
            style="height: 130px; width: 130px; border-radius: 10px"
          />
        </div>
        <div class="d-flex justify-content-center align-items-center mt-2">
          <h4>CURRENCY CONVERTER</h4>
        </div>
        <div class="amt mt-3">
          <h5>Amount:</h5>
          <input class="form-control" type="number" id="number" placeholder="100">
        </div>

        <div class="d-flex justify-content-between p-4">
          <div>
            <select name="USD" id="USD" class="couN p-2">
              <option value="">ind</option>
              <option value="">chi</option>
              <option value="">jap</option>
              <option value="">usa</option>
            </select>
          </div>
          <div>
            <select name="USD" id="USD" class="couN p-2">
              <option value="">ind</option>
              <option value="">chi</option>
              <option value="">jap</option>
              <option value="">usa</option>
            </select>
          </div>
        </div>

        <div class="d-flex justify-content-center align-items-center">
          <button class="btn">Convert</button>
          
        </div>

        <div class="d-flex justify-content-center align-items-center m-2">
          <button class="btn">1 USD Dollar = ₹95.2 rupees</button>
          
        </div>
      </div>
    </div>
    <!-- Bootstrap Script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
