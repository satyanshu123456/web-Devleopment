    <div class="w-25 bg-light rounded shadow border mx-auto mt-5">
      <h1 class="text-center mb-3">Age Calculator</h1>

      <form class="d-grid flex-column gap-3 align-items-center w-100 p-3 ">
        <label for="DOB">Enter your Date of Borth</label>

        <label for="CurrentDate">Choose Current Date</label>
        <input type="date" name="CurrentDate" id="CurrentDate" class="form-control" />
        <button type="submit" class="btn btn-primary">Calculate Age</button>
      </form>
      <div>
        <h6 class="fw-bold text-center">Your Age is: <span id=""></span></h6>
    </div>
    </div>
