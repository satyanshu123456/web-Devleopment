<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    
    <style>
    .main{
        background-image: url(./weather.jpg);
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
        height: 100vh;
    }
    .head{
        position: fixed;
        width: 100%;
    }

    </style>
  </head>
  <body>
    <header class="head bg-danger text-light p-2 text-center">
      <h2>Weather App</h2>
    </header>

    <div class="main d-flex justify-content-center align-items-center ">
        <div class="border border-1 mt-5 shadow rounded" style="height: 200px; width: 400px;">
        <div class="pt-3 text-center">
      <input class="rounded border-0" type="text" id="cityName" />
      <button class="rounded" onclick="getWeather()">Get Weather</button>
    </div>

    <br />

    <div class="text-center ">
      <label><b>Temp : </b><span id="Temperature"><b>30</b></span><b>ºC</b></label>
    </div>
    </div>
    </div>
    <!-- Bootstrap Script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
