<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="img">
      <div class="calDiv">
        <div class="topDiv rounded-top-3"> 0</div>
        <div class="secDiv rounded-3">
          <div class="div1">
            <button class="div2">AC</button>
            <button class="div2">C</button>
            <button class="div2">%</button>
            <button class="div2">/</button>
          </div>

          <div class="div1">
            <button class="div2">7</button>
            <button class="div2">8</button>
            <button class="div2">9</button>
            <button class="div2">*</button>
          </div>

          <div class="div1">
            <button class="div2">4</button>
            <button class="div2">5</button>
            <button class="div2">6</button>
            <button class="div2">-</button>
          </div>

          <div class="div1">
            <button class="div2">1</button>
            <button class="div2">2</button>
            <button class="div2">3</button>
            <button class="div2">+</button>
          </div>

          <div class="div1">
            <button class="div2">0</button>
            <button class="div2">.</button>
            <button style="height: 50px; width: 128px;  display: flex; justify-content: center; align-items: center; border-radius: 30px; background: green; color: white;">=</button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
