<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess The Number</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body
    class="bg-light d-flex align-items-center justify-content-center vh-100"
  >
    <div class="shadow p-4">
      <h2 class="text-center mb-3">Guess The Number</h2>
      <p class="text-muted text-center">
        We have selected a random number between 1 - 10. See if you can guess
        it.
      </p>

      <div class="mb-3">
        <label for="guessInput" class="form-label">Enter a guess:</label>
        <div class="d-flex gap-2">
          <input
            type="number"
            id="guessInput"
            class="form-control"
            min="1"
            max="10"
            placeholder="1 - 10"
          />
          <button class="btn-primary">Submit</button>
        </div>
      </div>

      <p class="mt-3 text-center fw-bold"></p>

      <button class="btn-outline-secondary w-100 d-none">Play Again</button>
    </div>
    <!-- Bootstrap js -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
