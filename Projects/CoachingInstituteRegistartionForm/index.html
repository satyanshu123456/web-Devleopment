<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="head">
      <h1 class="text-center">Coaching Institute Registration Form</h1>
    </div>

    <form class="frm">
      <div class="totalCode">
        <div class="firstMD">
          <div><h4>Personal Information:-</h4></div>

          <div class="persD1">
            <div class="gap-2">
              <label for="FullName">Full Name:</label>
              <input
                class="form-control border border-black"
                type="text"
                id="name"
                placeholder="Enter your name"
              />
            </div>
            <br />
            <div class="gap-2">
              <label for="email">Email Address:</label>
              <input
                class="form-control border border-black"
                type="email"
                id="email"
                placeholder="Enter your email"
              />
            </div>
            <br />
            <div class="gap-2">
              <label for="number">Mobile Number:</label>
              <input
                class="form-control border border-black"
                type="number"
                id="number"
                placeholder="Enter your number"
              />
            </div>
            <br />
            <div class="gap-2">
              <label for="date">Date of Birth:</label>
              <input
                class="form-control border border-black"
                type="date"
                id="date"
                placeholder="Enter you DOB"
              />
            </div>

            <div class="d-flex gap-2 pt-3">
              <h6>Gender:</h6>
              <input type="radio" id="male" name="gender" value="male" />
              <label for="male">Male</label>

              <input type="radio" id="Female" name="gender" value="Female" />
              <label for="Female">Female</label>

              <input type="radio" id="other" name="gender" value="Other" />
              <label for="other">Other</label>
            </div>
          </div>
        </div>

        <div class="secMD mt-3">
          <div><h4>Academic Details:-</h4></div>

          <div>
            <div class="persD2">
              <div>
                <label for="qualification">Last Completed Qualification:</label>
                <select class="" name="qualification" id="qualification">
                  <option value="#">Select</option>
                  <option value="#1">10th</option>
                  <option value="#2">12th</option>
                  <option value="#3">Graduation</option>
                  <option value="#4">Post-graduation</option>
                </select>
              </div>
            </div>

            <div class="persD2 pt-3">
              <div>
                <label for="qualification"
                  >Percentage/Grade in Last Qualification:</label
                >
                <select class="" name="qualification" id="qualification">
                  <option value="#">Select</option>
                  <option value="#1">10th-87.75%</option>
                  <option value="#2">12th-70.2%</option>
                  <option value="#3">Graduation-6.50 cgpa</option>
                  <option value="#4">Post-graduation -No</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <div class="thirdMD mt-3">
          <div><h4>Course Information:-</h4></div>

          <div>
            <div>
              <label for="Course">Preferred Course:</label>
              <select class="" name="Course" id="Course">
                <option value="#1">Select</option>
                <option value="">IIT-JEE</option>
                <option value="">NEET</option>
                <option value="">Banking Exams</option>
                <option value="">UPSC</option>
              </select>
            </div>

            <div class="pt-3">
              <label for="Preference"> Batch Timing Preference:</label>
              <select class="" name="Preference" id="Preference">
                <option value="#1">Select</option>
                <option value="">Morning</option>
                <option value="">Afternoon</option>
                <option value="">Evening</option>
                <option value="">Weekend</option>
              </select>
            </div>
          </div>
        </div>

        <div class="fourthMD mt-3">
          <div><h4>Address:-</h4></div>

          <div>
            <div class="d-flex gap-1">
              <h6>Residential Address:-</h6>
              <label for="address"></label>
              <textarea class="form-control" id="address" rows="3"></textarea>
            </div>
            <div class="mt-2 d-flex gap-1">
              <h6>City:-</h6>
              <span>Bhopal</span>
            </div>
            <div class="mt-2 d-flex gap-1">
              <h6>Pincode:-</h6>
              <span>462021</span>
            </div>
          </div>
        </div>

        <div class="fiveMD">
          <div><h4>Guardian Details:-</h4></div>

          <div>
            <div>
              <label for="gname">Guardian’s Full Name:</label>
              <input
                class="form-control border border-black"
                type="text"
                id="gname"
              />
            </div>
            <br />
            <div>
              <label for="number"> Guardian’s Contact Number:</label>
              <input
                class="form-control border border-black"
                type="number"
                id="number"
              />
            </div>
          </div>
        </div>

        <div class="sixMD">
          <h4 class="mb-3">Additional Information:-</h4>

          <div>
            <div class="col-md-6 mb-3">
              <label for="source"
                >How did you hear about us?
                <span class="text-danger">*</span>
              </label>
              <select>
                <option value="select">Select</option>
                <option value="Friends">Friends</option>
                <option value="Online Ad">Online Ad</option>
                <option value="Newspaper">Newspaper</option>
                <option value="Social Media">Social Media</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="col-md-12 mb-3">
              <label for="specialReq">Special Requirements (Optional) </label>
              <textarea
                class="s1 form-control"
                id="specialReq"
                rows="3"
                placeholder="Specify any additional needs..."
              ></textarea>
            </div>
          </div>
        </div>
        <div class="btn">
          <button class="btn1 border border-1" onclick="submit()">Submit</button>
        </div>
      </div>
    </form>

    <!-- Bootstrap js -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
