<!doctype html>
<html lang="en">
  <head>

    <main>
      <div class="w-50 mx-auto rounded border p-3 mt-4">fgfhy</div>
      <form>
        <input
          type="text"
          name="siteName"
          id="siteName"
          placeholder="Enter The User Name"

        />

        <input
          type="text"
          name="userName"
          id="userName"
          placeholder="Enter The User Name"
          class="form-control"
        />

        <input
          type="text"
          name="password"
          id="password"
          placeholder="Enter The password"
          class="form-control"
        />
