<!DOCTYPE html>
<html>
<head>
    <title>Pizza Order Form</title>
</head>
<body>

<form>

    <h1 align="center">Pizza Order Form</h1>

    <p>
        <label>First Name:</label>
        <input type="text" name="fname" required>
    </p>

    <p>
        <label>Last Name:</label>
        <input type="text" name="lname" required>
    </p>

    <p>
        <label>Email Address:</label>
        <input type="email" name="email" required>
    </p>

    <p>
        <label>Contact Number:</label>
        <input type="tel" name="phone" required>
    </p>

    <p>
        <label>Preferred Delivery Date:</label>
        <input type="date" name="date" required>
    </p>

    <p>
        <label>Size:</label><br>
        <input type="radio" name="size" value="small"> Small
        <input type="radio" name="size" value="medium"> Medium
        <input type="radio" name="size" value="large"> Large
    </p>

    <p>
        <label>Flavor:</label><br>

        <input type="checkbox" name="flavor1"> Hawaiian (Php 150.00)
        Qty: <input type="number" name="qty1" value="1" min="1" style="width: 50px;"><br>

        <input type="checkbox" name="flavor2"> Pepperoni (Php 140.00)
        Qty: <input type="number" name="qty2" value="1" min="1" style="width: 50px;"><br>

        <input type="checkbox" name="flavor3"> Vegetable (Php 130.00)
        Qty: <input type="number" name="qty3" value="1" min="1" style="width: 50px;">
    </p>

    <p>
        <label>Credit Card Number:</label>
        <input type="text" name="card" required>
    </p>

    <p>
        <label>PIN:</label>
        <input type="password" name="pin" maxlength="4" required>
    </p>

    <p>
        <label>Additional Note:</label><br>
        <textarea name="note" rows="4" cols="40"></textarea>
    </p>

    <p align="center">
        <button type="submit">Submit Order</button>
        <button type="reset">Reset</button>
    </p>

</form>
<br>
    <button><a href="../formsinHTML/sub.html">Go to back<-</a></button>
</body>
</html>
