<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="container  mt-5 gap-5">
      <input
        type="text"
        id="FullName"
        placeholder="Enter your Name"
        class="form-control"
      />
      <input type="email" id="EmailAddress" placeholder="Enter your email" class="form-control mt-3">
      <input type="text" id="city" placeholder="Place name" class="form-control mt-3">
      <input type="password" id="UserPass" placeholder="Enter your password" class="form-control mt-3">
      
      <div class="d-flex justify-content-center align-items-center mt-4"><button class="btn btn-primary" onclick="Submit()">Submit</button></div>
    </div>

    <hr />
    <div class="border rounded shadow container p-4 divHide" id="dataCard">
        <span>Name:</span>
      <span id="myData"></span>
      <br>
       <span>Email:</span>
      <span id="myData2"></span>
      <br>
      <span>City:</span>
      <span id="myData3"></span>
      <br>
      <span>Password:</span>
      <span id="myData4"></span>
    </div>

    <!-- javascript -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
